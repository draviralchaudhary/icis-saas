# ─────────────────────────────────────────
# ICIS SaaS — GitHub Pages Deployment
# ─────────────────────────────────────────
name: ICIS Frontend Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: npm install

      # Build project
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      # Deploy
      - name: Deploy
        uses: actions/deploy-pages@v4